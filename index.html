<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Midwest Concrete Coatings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--orange:#ff5500;--cream:#f2ede6;--dark:#0a0a0a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--cream)}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1rem;background:#000;border-bottom:2px solid var(--orange)}
.nav-logo{display:flex;gap:.5rem;align-items:center}
.nav-logo img{height:35px}
.nav-logo-text{font-family:'Bebas Neue';color:#fff}
.nav-logo-text span{color:var(--orange);font-size:.6rem}
.nav-cta{background:var(--orange);padding:.5rem 1rem;color:#fff;text-decoration:none}
.hero{padding-top:80px;text-align:center;padding:2rem}
.hero h1{font-family:'Bebas Neue';font-size:2.8rem}
.hero span{color:var(--orange)}
.hero p{color:#bbb;margin-top:1rem}
.hero a{display:inline-block;margin-top:1rem;background:var(--orange);padding:.7rem 1.2rem;color:#fff;text-decoration:none}
.process{display:grid;gap:1rem;padding:2rem}
.step{background:#111;padding:1rem;border-left:3px solid var(--orange)}
.step-num{color:var(--orange);opacity:.3}
</style>
</head>
<body>
<nav>
<div class="nav-logo">
<img src="IMG_2502.webp">
<div class="nav-logo-text">Midwest<br><span>Concrete Coatings</span></div>
</div>
<a href="#" class="nav-cta">Free Estimate</a>
</nav>
<div class="hero">
<h1>Floors Built <span>To Last</span></h1>
<p>One day install. Stronger than epoxy.</p>
<a href="#">Get Quote</a>
</div>
<div class="process">
<div class="step"><div class="step-num">01</div>Estimate</div>
<div class="step"><div class="step-num">02</div>Prep</div>
<div class="step"><div class="step-num">03</div>Coat</div>
<div class="step"><div class="step-num">04</div>Done</div>
</div>
</body>
</html>
